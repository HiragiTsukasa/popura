<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>…</title>
<style>
*{box-sizing:border-box}
body{margin:0;height:100vh;overflow:hidden;font-family:"MS UI Gothic","MS PGothic",Tahoma,sans-serif;font-size:12px;
background:linear-gradient(180deg,#3a86d4 0%,#7db9e8 45%,#8fce7a 62%,#4f9e3f 100%);}
#icons{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:16px}
.dicon{width:76px;text-align:center;color:#fff;text-shadow:1px 1px 2px #000;cursor:pointer;user-select:none}
.dicon .img{font-size:30px}
#memoicon{display:none}
.win{position:absolute;background:#ece9d8;border:1px solid #0842a0;border-radius:8px 8px 0 0;
box-shadow:2px 2px 10px rgba(0,0,0,.45);display:none;flex-direction:column;min-width:280px}
.tbar{background:linear-gradient(180deg,#2a6de5,#1450c8 45%,#1855d4);color:#fff;font-weight:bold;
padding:5px 8px;border-radius:7px 7px 0 0;display:flex;justify-content:space-between;align-items:center;cursor:move}
.tbar .btns span{display:inline-block;width:20px;height:18px;background:#d6553d;border:1px solid #fff;
border-radius:3px;color:#fff;text-align:center;line-height:16px;cursor:pointer;margin-left:3px;font-size:11px}
.wbody{flex:1;overflow:auto;background:#fff;border:2px solid #ece9d8}
/* ブラウザ */
#ie{width:min(900px,94vw);height:min(620px,82vh);left:100px;top:20px}
#ietools{background:#ece9d8;padding:4px 6px;display:flex;gap:6px;align-items:center;border-bottom:1px solid #aaa}
#ietools button{font-size:11px}
#addr{flex:1;border:1px solid #7a96df;padding:3px 6px;font-size:12px;color:#444}
#bookmarks{background:#f1efe2;border-bottom:1px solid #b8b49a;padding:3px 8px;display:flex;gap:14px;align-items:center;font-size:11px}
#bookmarks .bmlabel{color:#887;font-size:10px}
#bookmarks .bm{color:#04a;cursor:pointer;text-decoration:none}
#bookmarks .bm:hover{text-decoration:underline}
#view{flex:1;position:relative;overflow:hidden;background:#fff}
#frame{border:0;width:100%;height:100%;display:none}
#portal{position:absolute;inset:0;overflow:auto;display:block}
/* ポータル(ホーム) */
#ptop{display:flex;justify-content:flex-end;padding:8px 14px;font-size:11px}
#ptop a{color:#04a;cursor:pointer}
#phome{display:flex;flex-direction:column;align-items:center;padding-top:56px}
#phome .logo{font-size:40px;font-weight:bold;letter-spacing:2px;color:#2a6d2a;font-family:Verdana,sans-serif}
#phome .logo span{color:#d80}
#phome .sub{color:#888;font-size:11px;margin:2px 0 26px}
.searchrow{display:flex;gap:6px}
.searchrow input{width:min(420px,60vw);border:1px solid #999;padding:6px 8px;font-size:14px}
.searchrow button{padding:6px 16px;font-size:12px}
/* 検索結果 */
#presult{padding:14px 26px;display:none}
#presult .bar{border-bottom:2px solid #2a6d2a;padding-bottom:6px;margin-bottom:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#presult .bar .mini{font-size:20px;font-weight:bold;color:#2a6d2a;font-family:Verdana}
#presult .bar .mini span{color:#d80}
#presult .cnt{color:#888;font-size:11px;margin-bottom:14px}
.hit{margin-bottom:20px;max-width:600px}
.hit a{color:#0428c8;font-size:15px;text-decoration:underline;cursor:pointer}
.hit .url{color:#0a7a0a;font-size:11px}
.hit .snip{color:#333;font-size:12px;line-height:1.6}
.noresult{color:#555;padding:30px 0}
/* Webメール */
#pmail{display:none;height:100%;flex-direction:column}
#mhead{background:#2a6d2a;color:#fff;padding:8px 14px;font-weight:bold;display:flex;justify-content:space-between}
#mhead .acct{font-weight:normal;font-size:11px}
#mmain{flex:1;display:flex;overflow:hidden}
#mlist{width:250px;border-right:1px solid #cbd;overflow:auto;background:#f6f8f4}
.mrow{padding:8px 10px;border-bottom:1px solid #e2e8dc;cursor:pointer}
.mrow:hover{background:#e8f2e0}
.mrow.read{background:#eceee8}
.mrow.read .frm{font-weight:normal;color:#667}
.mrow .frm{font-weight:bold;font-size:12px}
.mrow .sj{font-size:11px;color:#345}
.mrow .dt{font-size:10px;color:#999}
.mrow.sent .frm{color:#777;font-weight:normal}
#mbody{flex:1;overflow:auto;padding:14px 18px}
#mbody .mh{border-bottom:1px solid #ccd;padding-bottom:8px;margin-bottom:10px;font-size:11px;color:#556}
#mbody .mh b{font-size:13px;color:#123}
#mbody .mtx{line-height:1.9;white-space:pre-wrap;font-size:12px}
.attach{display:inline-block;background:#eef2ea;border:1px solid #9b9;padding:6px 10px;margin-top:10px;font-size:11px;color:#464;cursor:pointer}
/* ごみ箱・メモ・手紙 */
#memo{width:min(470px,88vw);height:400px;left:300px;top:100px}
#memo textarea{width:100%;height:100%;border:0;resize:none;font-family:"MS Gothic",monospace;font-size:12px;padding:8px;line-height:1.7}
#trash{width:min(420px,86vw);height:240px;left:340px;top:170px}
#trash .row{display:flex;gap:10px;padding:10px 14px;align-items:center;cursor:pointer}
#trash .row:hover{background:#e8f0fc}
#trash .empty{color:#999;text-align:center;padding:60px 0}
#letter{width:min(500px,90vw);height:min(480px,78vh);left:250px;top:60px}
#letter .txt{padding:14px;font-family:"MS Gothic",monospace;font-size:12px;line-height:2;white-space:pre-wrap}
/* タスクバー */
#taskbar{position:fixed;left:0;right:0;bottom:0;height:34px;background:linear-gradient(180deg,#3a75e8,#2456c8 50%,#1e4cb8);display:flex;align-items:center;z-index:1000}
#startbtn{background:linear-gradient(180deg,#7ebf5a,#3d9420);color:#fff;font-weight:bold;font-style:italic;height:34px;border:0;border-radius:0 10px 10px 0;padding:0 20px 0 12px;font-size:15px;cursor:pointer;text-shadow:1px 1px 2px #063}
#tasks{flex:1;display:flex;gap:4px;padding:0 8px}
.task{background:#3a68d8;color:#fff;padding:4px 14px;border-radius:3px;font-size:11px;cursor:pointer;border:1px solid #6a90e8}
#clock{background:#1a90d8;color:#fff;height:34px;display:flex;align-items:center;padding:0 14px;border-left:1px solid #4ab0f0}

/* ===== 横持ちスマホ:高さ圧縮 ===== */
@media (orientation: landscape) and (max-height: 520px){
 #ie{left:1vw !important;top:1vh !important;width:98vw !important;height:calc(100vh - 32px - 2vh) !important}
 #taskbar{height:30px}
 #startbtn{height:30px;font-size:12px;padding:0 12px}
 #clock{height:30px;font-size:11px}
}
/* ===== 縦持ちスマホ:全画面アプリ型 ===== */
@media (orientation: portrait) and (max-width: 700px){
 #icons{display:none}
 .win{border-radius:0;border:0}
 #ie{display:flex !important;left:0 !important;top:0 !important;width:100vw !important;height:calc(100% - 52px) !important;min-width:0}
 #ie .tbar{cursor:default;border-radius:0;font-size:13px}
 #ie .tbar .btns{display:none}
 #ietools{flex-wrap:nowrap}
 #ietools button{font-size:13px}
 #memo,#trash,#letter,#errdlg{left:0 !important;top:0 !important;width:100vw !important;height:calc(100% - 52px) !important;min-width:0}
 .tbar{cursor:default}
 /* メール縦積み */
 #mmain{position:relative}
 #mlist{width:100%;border-right:0}
 .mrow{padding:12px 12px}
 #mbody{position:absolute;inset:0;background:#fff;display:none;flex-direction:column;overflow:auto}
 #mmain.msgopen #mbody{display:block}
 #mback{display:block;background:#2a6d2a;color:#fff;padding:10px 12px;font-size:13px;cursor:pointer;margin:-14px -18px 12px}
 /* タスクバー */
 #taskbar{height:52px}
 #startbtn{height:52px}
 #tasks{display:none}
 #ticons{display:flex !important;flex:1;justify-content:space-around;font-size:22px;color:#fff}
 #ticons span{padding:4px 10px;border-radius:4px;cursor:pointer}
 #clock{height:52px}
 /* エンドロール */
 #roll p{font-size:11px}
 #memorial img{width:min(240px,64vw)}
}
#ticons{display:none}
#mback{display:none}

/* エンドロール */
#endroll{position:fixed;inset:0;background:#000;z-index:5000;display:none;opacity:0;transition:opacity 2.5s}
#rollwrap{position:absolute;inset:0;overflow:hidden}
#roll{position:absolute;left:50%;transform:translateX(-50%);width:min(720px,94vw);top:100%;text-align:left;color:#ddd;
font-family:"Noto Serif CJK JP","Yu Mincho",serif;font-size:17px;line-height:2.1}
#roll p{margin:58px 0;font-size:14px;letter-spacing:0.5px;white-space:nowrap}
#roll .ry{color:#fff;font-size:21px;letter-spacing:8px;margin:80px 0 60px;text-align:center}
#roll .rd{color:#888;font-size:13px;letter-spacing:2px}
#roll .rs2{color:#777;font-size:13px}
#roll .rq{color:#fff}
#roll .rs{color:#b66;font-size:15px}
#roll .rgap{margin:110px 0}
#roll.playing{animation:rollup 150s linear forwards}
@keyframes rollup{from{transform:translateX(-50%) translateY(0)}to{transform:translateX(-50%) translateY(calc(-100% - 100vh))}}
#memorial{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity 4s;text-align:center}
#memorial img{width:min(300px,60vw);border:1px solid #333;filter:grayscale(35%) brightness(.92);margin-bottom:34px}
#memorial p{color:#ccc;font-family:"Noto Serif CJK JP","Yu Mincho",serif;margin:8px 0}
#memorial .mt1{font-size:15px;color:#999;letter-spacing:2px}
#memorial .mt2{font-size:17px}
#memorial .mt3{font-size:15px;color:#aaa;margin-top:30px}
#memorial .mend{margin-top:60px;font-size:12px;color:#555;cursor:pointer}
#memorial .mend:hover{color:#999}
</style>
</head>
<body>

<div id="icons">
<div class="dicon" onclick="openWin('ie')"><div class="img">🌐</div><div class="label">Internet<br>Explorer</div></div>
<div class="dicon" onclick="openWin('trash')"><div class="img">🗑️</div><div class="label">ごみ箱</div></div>
<div class="dicon" id="memoicon" onclick="openMemo()"><div class="img">📄</div><div class="label">調査メモ.txt</div></div>
</div>

<div class="win" id="ie">
<div class="tbar" onmousedown="drag(event,'ie')"><span>🌐 Internet Explorer</span><span class="btns"><span onclick="closeWin('ie')">×</span></span></div>

<button id="navback" onclick="goBack()">◀</button>

</div>

</div>

var hStack=[], hPos=-1, replaying=false;
function record(s){
 if(replaying)return;
 hStack = hStack.slice(0, hPos+1);
 hStack.push(s); hPos = hStack.length-1; updNav();
}
function replay(s){
 replaying=true;
 try{
  if(s.t==='home')showHome();
  else if(s.t==='mail')showMail();
  else if(s.t==='search'){document.getElementById('q2').value=s.q;document.getElementById('q').value=s.q;doSearch(true);}
  else if(s.t==='site')go(s.id,s.a);
  else if(s.t==='attach')openAttach(s.f);
  else if(s.t==='dead')deadPage(s.u);
 }finally{replaying=false; updNav();}
}
function goBack(){ if(hPos>0){hPos--; replay(hStack[hPos]);} }
function goFwd(){ if(hPos<hStack.length-1){hPos++; replay(hStack[hPos]);} }
function updNav(){
 var b=document.getElementById('navback'), f=document.getElementById('navfwd');
 if(b){b.disabled=(hPos<=0); f.disabled=(hPos>=hStack.length-1);}
}

function playKeen(delay,vol){
 try{
  var ac=window._ac||(window._ac=new (window.AudioContext||window.webkitAudioContext)());
  var t=ac.currentTime+(delay||0);
  [2793,4186,5583].forEach(function(f,i){
   var o=ac.createOscillator(),g=ac.createGain();
   o.frequency.value=f;o.type='sine';
   g.gain.setValueAtTime((vol||0.05)/(i+1),t);
   g.gain.exponentialRampToValueAtTime(0.00001,t+3.5);
   o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+3.6);
  });
 }catch(e){}
}

function go(id,anchor){
 record({t:'site',id:id,a:anchor});
 var s=pages[id];
 var src=s.p;
 if(id==='08'&&visited['09']){src+='?k=1103';unlockLetter();}
 if(anchor)src+='#'+anchor;
 document.getElementById('portal').style.display='none';
 var f=document.getElementById('frame');
 f.src=src; f.style.display='block';
 document.getElementById('addr').value='http://'+s.u+'/';
 visit(id);
}
var letterReady=false;
function unlockLetter(){
 if(letterReady)return; letterReady=true;
 document.getElementById('trashbody').innerHTML=
  '<div class="row" onclick="openWin(\'letter\')"><span style="font-size:22px">📄</span><span>下書き.txt<br><span style="color:#999;font-size:10px">サイズ:2 KB</span></span></div>';
}
function visit(id){
 if(visited[id])return; visited[id]=true;
 /* メモの進度更新 */
 var icon=document.getElementById('memoicon');
 var txt='';
 var any=false;
 memoParts.forEach(function(p){ if(visited[p.need]){txt+=p.tx;any=true;} });
 if(any){icon.style.display='block';document.getElementById('ti_memo').style.display='inline';document.getElementById('memotext').value=txt;}

}

function doSearch(fromResult){
 var q=(fromResult?document.getElementById('q2'):document.getElementById('q')).value.trim();
 if(!q)return;
 var terms=q.split(/[\s　]+/);
 var hits=index.filter(function(e){
   return terms.some(function(t){ return e.kw.some(function(k){ return t.indexOf(k)>=0||k.indexOf(t)>=0; }); });
 });
 hits=hits.filter(function(e){ return !e.lock || visited[e.lock]; });
 record({t:'search',q:q});
 document.getElementById('frame').style.display='none';
 document.getElementById('portal').style.display='block';
 hidePortalPanels();
 document.getElementById('presult').style.display='block';
 document.getElementById('q2').value=q;
 document.getElementById('addr').value='http://www.poplasearch.jp/search?q='+encodeURIComponent(q);
 var rl=document.getElementById('rlist'); rl.innerHTML='';
 if(hits.length>0){addHist(q);}
 if(hits.length===0){
   document.getElementById('rcnt').textContent='';
   rl.innerHTML='<div class="noresult">「'+esc(q)+'」に一致するページは見つかりませんでした。<br><br>・ことばを変えてみてください<br>・ひらがな/カタカナ/漢字を変えてみてください</div>';
   return;
 }
 document.getElementById('rcnt').textContent=hits.length+' 件見つかりました('+esc(q)+')';
 hits.forEach(function(e){
   var d=document.createElement('div');d.className='hit';
   d.innerHTML='<a></a><div class="url">'+e.u+'</div><div class="snip">'+e.s+'</div>';
   var a=d.querySelector('a'); a.textContent=e.t;
   a.onclick=e.site?function(){go(e.site,e.a);}:function(){deadPage(e.u);};
   rl.appendChild(d);
 });
}

function openAttach(f){
 if(!f)return;
 record({t:'attach',f:f});
 document.getElementById('portal').style.display='none';
 var fr=document.getElementById('frame');
 fr.src='data:text/html;charset=utf-8,'+encodeURIComponent('<body style="margin:0;background:#333;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="'+ATTACH_KANBAN+'" style="max-width:98%;max-height:98vh"></body>');
 fr.style.display='block';
 document.getElementById('addr').value='http://mail.popla.jp/attach/'+f;
}
function deadPage(u){
 record({t:'dead',u:u});
 document.getElementById('portal').style.display='none';
 var f=document.getElementById('frame');
 f.src='data:text/html;charset=utf-8,'+encodeURIComponent('<body style="font-family:sans-serif;padding:30px;color:#333"><h3>ページを表示できません</h3><p>検索中のページは、現在、利用できません。Web サイトに技術的な問題が発生しているか、ページが削除された可能性があります。</p><hr><p style="color:#888;font-size:12px">HTTP 404 - ファイル未検出<br>Internet Explorer</p></body>');
 f.style.display='block';
 document.getElementById('addr').value='http://'+u;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function addHist(q){
 var dl=document.getElementById('hist');
 var dup=Array.prototype.some.call(dl.options,function(o){return o.value===q;});
 if(dup)return;
 var o=document.createElement('option');o.value=q;
 dl.insertBefore(o,dl.firstChild);
}
function drag(e,id){
 if(window.matchMedia('(orientation: portrait) and (max-width: 700px)').matches)return;
 var w=document.getElementById(id);w.style.zIndex=++z;
 var sx=e.clientX-w.offsetLeft, sy=e.clientY-w.offsetTop;
 function mv(ev){w.style.left=(ev.clientX-sx)+'px';w.style.top=(ev.clientY-sy)+'px';}
 function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}
 document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
}
document.getElementById('q').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
document.getElementById('q2').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch(true);});
var folder2id={};
(function(){for(var k in pages){var mm=pages[k].p.match(/\.\.\/(f\d\d)\//); if(mm)folder2id[mm[1]]=k;}})();
document.getElementById('frame').addEventListener('load', function(){
 try{
  var fr=document.getElementById('frame');
  var pth=(fr.contentWindow.location.pathname)||'';
  var mm=pth.match(/\/(f\d\d)\//); if(!mm)return;
  var id=folder2id[mm[1]]; if(!id)return;
  document.getElementById('addr').value='http://'+pages[id].u+'/';
  visit(id);
  var cur=hStack[hPos];
  if(!(cur&&cur.t==='site'&&cur.id===id)){record({t:'site',id:id});}
 }catch(e){}
});
openWin('ie');
record({t:'home'});
updNav();
